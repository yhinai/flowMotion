name: flowmotion
region: nyc

services:
  - name: web
    github:
      repo: yhinai/flowMotion
      branch: main
      deploy_on_push: true
    build_command: npm run build
    run_command: npm start
    http_port: 3000
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /api/live-topics
    envs:
      - key: GEMINI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ""
      - key: ELEVENLABS_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ""
      - key: GOOGLE_CLOUD_PROJECT_ID
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: GOOGLE_CLOUD_LOCATION
        scope: RUN_AND_BUILD_TIME
        value: "us-central1"
      - key: DO_SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ""
      - key: DO_SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ""
      - key: DO_SPACES_BUCKET
        scope: RUN_AND_BUILD_TIME
        value: "flowmotion-videos"
      - key: DO_SPACES_REGION
        scope: RUN_AND_BUILD_TIME
        value: "nyc3"
      - key: TELEGRAM_BOT_TOKEN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ""
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: ENABLE_BULLMQ
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: NEXLA_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ""
      - key: NEXLA_NEWS_NEXSET_ID
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: NEXLA_CRYPTO_NEXSET_ID
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: NEXLA_WEATHER_NEXSET_ID
        scope: RUN_AND_BUILD_TIME
        value: ""
      - key: NEWSAPI_KEY
        scope: RUN_AND_BUILD_TIME
        value: ""
